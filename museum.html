<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bảo Tàng Số 3D — Tinh Hoa Việt</title>
<link rel="icon" href="favicon.png" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0303;}
/* Layer order: bg(0) < webgl(1) < css3d(2) < ui(100+) */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#webgl-layer{position:fixed;inset:0;z-index:1;pointer-events:auto;}
/* CSS3D layer MUST NOT capture any pointer events — they need to reach the WebGL canvas */
#css-layer,#css-layer *{pointer-events:none !important;}

nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:14px 28px;background:linear-gradient(to bottom,rgba(6,1,3,.97),transparent);border-bottom:1px solid rgba(212,175,55,.15);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-logo img{width:32px;height:32px;object-fit:contain;}
.nav-logo span{font-family:'Marcellus',serif;font-size:16px;color:#d4af37;letter-spacing:3px;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-links a{color:rgba(252,249,240,.7);text-decoration:none;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.nav-links a:hover{color:#d4af37;}
.nav-badge{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.35);color:#d4af37;padding:5px 12px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:2px;}

#loading{position:fixed;inset:0;background:#060103;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .8s;}
#loading.hide{opacity:0;pointer-events:none;}
.ring{width:52px;height:52px;border:2px solid rgba(212,175,55,.2);border-top-color:#d4af37;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg);}}
.lt{font-family:'Marcellus',serif;font-size:13px;color:rgba(212,175,55,.8);letter-spacing:4px;text-transform:uppercase;}

#hint{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(6,1,3,.85);border:1px solid rgba(212,175,55,.3);color:rgba(252,249,240,.7);padding:9px 22px;border-radius:30px;font-size:11px;letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(8px);transition:opacity .5s;z-index:50;font-family:'Outfit',sans-serif;}
#hint.hide{opacity:0;}

#lbl{position:fixed;pointer-events:none;background:rgba(6,1,3,.9);border:1px solid rgba(212,175,55,.4);color:#d4af37;padding:7px 16px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;backdrop-filter:blur(8px);opacity:0;transition:opacity .2s;z-index:150;font-family:'Outfit',sans-serif;}

/* Focus UI */
#focus-ui {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.5s;
}
#focus-ui.open { opacity: 1; pointer-events: auto; }
#btn-close-focus {
  position: absolute;
  top: 90px; /* Di chuyển xuống dưới thanh navbar */
  right: 40px;
  padding: 12px 24px;
  background: #d4af37;
  color: #060103;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 50px;
  cursor: pointer;
  pointer-events: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  z-index: 600;
}
#focus-nav {
  position: absolute;
  bottom: 25px; /* Hạ thấp hơn nữa */
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 20px;
}
#btn-detail-link {
  padding: 14px 28px;
  background: rgba(6, 1, 3, 0.8);
  border: 1px solid rgba(212, 175, 55, 0.4);
  color: #d4af37;
  text-decoration: none;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 8px;
  backdrop-filter: blur(10px);
}

/* 3D Panel styles for In-Scene */
.f-panel {
  width: 650px; /* Tăng chiều rộng */
  background: rgba(12, 2, 3, 0.98);
  border: 3px solid rgba(212, 175, 55, 0.4);
  border-radius: 24px;
  padding: 50px;
  color: #fcf9f0;
  font-family: 'Outfit', sans-serif;
  box-shadow: 0 40px 80px rgba(0,0,0,0.9);
}
.f-label { font-size: 18px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; color: #d4af37; margin-bottom: 20px; opacity: 0.8; }
.f-name { font-family: 'Marcellus', serif; font-size: 72px; margin-bottom: 10px; line-height: 1.1; }
.f-title { font-size: 20px; color: rgba(212, 175, 55, 0.7); margin-bottom: 30px; letter-spacing: 3px; font-weight: 700; text-transform: uppercase; }
.f-quote { font-style: italic; font-size: 24px; line-height: 1.8; padding-left: 25px; border-left: 4px solid #d4af37; margin-bottom: 40px; color: rgba(252, 249, 240, 0.9); }
.f-bio-text { font-size: 20px; color: rgba(252, 249, 240, 0.7); line-height: 1.8; margin-bottom: 30px; }
.f-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 20px; }
.f-m-item { font-size: 18px; }
.f-m-label { color: rgba(212, 175, 55, 0.5); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 1px; }

.f-ach { display: flex; flex-direction: column; gap: 25px; }
.f-ach-item { display: flex; gap: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
.f-ach-num { font-family: 'Marcellus', serif; font-size: 48px; color: rgba(212, 175, 55, 0.2); line-height: 1; }
.f-ach-text h4 { font-size: 24px; margin-bottom: 6px; color: #fcf9f0; }
.f-ach-text p { font-size: 19px; color: rgba(252, 249, 240, 0.6); line-height: 1.6; }

.f-panel-infographic {
  width: 550px; /* Tăng kích thước bảng infographic trong 3D */
  background: rgba(12, 2, 3, 0.4);
  backdrop-filter: blur(15px);
  border: 2px solid rgba(212, 175, 55, 0.5);
  border-radius: 24px;
  padding: 15px;
  color: #fcf9f0;
  box-shadow: 0 30px 60px rgba(0,0,0,0.8);
}

/* 3D Center Title Style */
.title-3d {
  font-family: 'Marcellus', serif;
  font-size: 80px;
  color: #d4af37;
  text-align: center;
  white-space: nowrap;
  letter-spacing: 12px;
  text-shadow: 0 0 30px rgba(212,175,55,0.4);
  filter: drop-shadow(0 0 10px rgba(212,175,55,0.3));
  opacity: 0.9;
  user-select: none;
}



/* Dots */
#dots{position:fixed;left:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;z-index:50;}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(212,175,55,.22);transition:all .3s;cursor:pointer;}
.dot.on{background:#d4af37;height:18px;border-radius:3px;}

/* CSS3D images */
.fig-img{width:200px;height:280px;object-fit:cover;object-position:top;display:block;border-radius:2px;user-select:none;backface-visibility:hidden;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="webgl-layer"></div>
<div id="css-layer"></div>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="favicon.png" alt="Logo">
    <span>TINH HOA VIỆT</span>
  </a>
  <div class="nav-links">
    <a href="index.html">← Trang chủ</a>
    <span class="nav-badge">🏛 Bảo Tàng Số 3D</span>
  </div>
</nav>

<div id="loading"><div class="ring"></div><div class="lt">Đang tải bảo tàng…</div></div>
<div id="lbl"></div>
<div id="dots"></div>
<div id="hint">Kéo để xoay · Nhấp để khám phá danh nhân</div>

<div id="focus-ui">
  <div id="btn-close-focus">✕ Đóng chế độ xem</div>
  <div id="focus-nav">
    <a id="btn-detail-link" href="#" target="_blank">Xem hồ sơ đầy đủ</a>
  </div>
</div>



<script src="data.js"></script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.165.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.165.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';

// ─── DATA ─────────────────────────────────────────────────────────────
const COLS = [
  {hex:0x3db8a8,glow:0x00ffd5},
  {hex:0xcc3333,glow:0xff5555},
  {hex:0x3a8fd4,glow:0x55bbff},
  {hex:0xb8862a,glow:0xffc84a},
  {hex:0x9b59b6,glow:0xd480ff},
  {hex:0x27ae60,glow:0x4edd88},
  {hex:0xe05050,glow:0xff7070},
  {hex:0xd4a017,glow:0xffd700},
];

// ─── RENDERERS ────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight;

// WebGL
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.setClearColor(0x000000, 0);
document.getElementById('webgl-layer').appendChild(renderer.domElement);

// CSS3D
const cssRenderer = new CSS3DRenderer();
cssRenderer.setSize(W, H);
// Disable pointer events on the CSS3D layer entirely so WebGL canvas gets all mouse events
cssRenderer.domElement.style.cssText = 'position:absolute;inset:0;pointer-events:none;';
document.getElementById('css-layer').appendChild(cssRenderer.domElement);

// ─── SCENES & CAMERA ──────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x2a0505, 0.025);

const cssScene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(65, W/H, 0.1, 300);
camera.position.set(0, 4, 22);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.enablePan = false;
controls.minDistance = 10;
controls.maxDistance = 35;
controls.maxPolarAngle = Math.PI/1.7;
controls.minPolarAngle = Math.PI/8;
controls.target.set(0, 1.5, 0);
controls.autoRotate = true;
controls.autoRotateSpeed = 0.4;

const RADIUS = 15;
const figures = (typeof danhNhanData !== 'undefined') ? danhNhanData : [];

// ─── 3D CENTER TITLE ──────────────────────────────────────────────────
const titleDiv = document.createElement('div');
titleDiv.className = 'title-3d';
titleDiv.textContent = 'TINH HOA VIỆT';
const titleObj = new CSS3DObject(titleDiv);
titleObj.position.set(0, 10, 0); // Đưa lên cao (4.5 -> 10)
titleObj.scale.setScalar(0.04);
cssScene.add(titleObj);

// ─── LIGHTING ─────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x200608, 4));
scene.add(new THREE.HemisphereLight(0x3a0a0a, 0x0a0204, 0.8));
const fill = new THREE.DirectionalLight(0xffddaa, 0.5);
fill.position.set(-8, 12, 8);
scene.add(fill);

// ─── NO GRID/FLOOR — background canvas handles ground visuals ──────────
// Subtle golden glow ring on ground only
const gRing = new THREE.Mesh(new THREE.RingGeometry(11.5,12.3,64),new THREE.MeshBasicMaterial({color:0xd4af37,transparent:true,opacity:0.12,side:THREE.DoubleSide}));
gRing.rotation.x=-Math.PI/2;
gRing.position.y=0.01;
scene.add(gRing);

// ─── FIGURES ──────────────────────────────────────────────────────────
const FW = 2.0, FH = 2.8, FD = 0.14; // frame width, height, depth
const PHOTO_SCALE = 0.01; // CSS px -> Three.js units: FW/200px = 0.01

const groups = [];
const hitMeshes = []; // for raycasting

figures.forEach((person, i) => {
  const col = COLS[i] || COLS[0];
  const angle = (i / figures.length) * Math.PI * 2;
  const x = Math.sin(angle) * RADIUS;
  const z = Math.cos(angle) * RADIUS;

  // ── WebGL group ────────────────────────────────────────────────────
  const g = new THREE.Group();
  g.position.set(x, 0, z);
  g.rotation.y = angle;
  g.userData = {index: i, person, col, angle};
  scene.add(g);
  groups.push(g);

  const barMat = new THREE.MeshStandardMaterial({
    color: col.hex, emissive: col.hex, emissiveIntensity: 0.25,
    metalness: 0.9, roughness: 0.12
  });

  // Pedestal
  const ped = new THREE.Mesh(
    new THREE.CylinderGeometry(1.3,1.5,0.25,6),
    new THREE.MeshStandardMaterial({color:0x180810, roughness:0.6, metalness:0.5})
  );
  ped.position.y = 0.125;
  ped.castShadow = true;
  g.add(ped);

  // Pedestal ring
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(1.3, 0.055, 8, 32),
    new THREE.MeshStandardMaterial({color:col.hex, emissive:col.hex, emissiveIntensity:0.5, metalness:0.8, roughness:0.2})
  );
  ring.rotation.x = Math.PI/2;
  ring.position.y = 0.26;
  g.add(ring);
  g.userData.ring = ring;

  // Shaft connecting pedestal to frame
  const shaft = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.1, 1.1, 8),
    new THREE.MeshStandardMaterial({color:col.hex, metalness:0.8, roughness:0.3})
  );
  shaft.position.y = 0.85;
  g.add(shaft);

  // Frame center Y
  const FCY = FH/2 + 1.45;

  // ── Hollow frame: 4 bars ───────────────────────────────────────────
  const bT = 0.14; // bar thickness
  const bars = [
    [FW + bT, bT, FD, 0, FCY + FH/2 + bT/2, 0],   // top
    [FW + bT, bT, FD, 0, FCY - FH/2 - bT/2, 0],   // bottom
    [bT, FH + bT*2, FD, -FW/2 - bT/2, FCY, 0],     // left
    [bT, FH + bT*2, FD, FW/2 + bT/2, FCY, 0],      // right
  ];
  bars.forEach(([bw, bh, bd, bx, by, bz]) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, bd), barMat);
    b.position.set(bx, by, bz);
    b.castShadow = true;
    g.add(b);
  });

  // Corner gems
  [[FW/2+bT/2, FCY+FH/2+bT/2], [-FW/2-bT/2, FCY+FH/2+bT/2],
   [FW/2+bT/2, FCY-FH/2-bT/2], [-FW/2-bT/2, FCY-FH/2-bT/2]
  ].forEach(([gx, gy]) => {
    const gem = new THREE.Mesh(
      new THREE.OctahedronGeometry(0.07),
      new THREE.MeshStandardMaterial({color:col.glow, emissive:col.glow, emissiveIntensity:1.2, metalness:1, roughness:0})
    );
    gem.position.set(gx, gy, FD/2+0.04);
    g.add(gem);
  });

  // Invisible hit plane for raycasting (covers whole frame)
  const hit = new THREE.Mesh(
    new THREE.PlaneGeometry(FW, FH),
    new THREE.MeshBasicMaterial({visible:false, side:THREE.DoubleSide})
  );
  hit.position.set(0, FCY, FD/2+0.01);
  hit.userData = {figureIndex: i};
  g.add(hit);
  hitMeshes.push(hit);

  // Lights
  const spot = new THREE.SpotLight(col.glow, 10, 16, Math.PI/7, 0.5, 1.5);
  spot.position.set(0, 9, 2);
  spot.target.position.set(0, FCY, 0);
  spot.castShadow = false;
  g.add(spot);
  g.add(spot.target);

  const pt = new THREE.PointLight(col.hex, 3, 7);
  pt.position.set(0, FCY, 1.5);
  g.add(pt);
  g.userData.pt = pt;

  // Particles
  const N = 55;
  const pos = new Float32Array(N*3);
  for(let j=0;j<N;j++){
    pos[j*3]   = (Math.random()-.5)*3.5;
    pos[j*3+1] = Math.random()*7;
    pos[j*3+2] = (Math.random()-.5)*2.5;
  }
  const pg = new THREE.BufferGeometry();
  pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(pg, new THREE.PointsMaterial({
    color: col.glow, size:0.035, transparent:true, opacity:0.55, sizeAttenuation:true
  }));
  g.add(pts);
  g.userData.pts = pts;
  g.userData.ppos = pos;

  // ── CSS3D image ───────────────────────────────────────────────────
  const imgEl = document.createElement('img');
  imgEl.className = 'fig-img';
  imgEl.src = person.image || person.headerAvatar || person.avatar || '';
  imgEl.alt = person.name;
  imgEl.onerror = () => {
    // Fallback: colored div with initials
    imgEl.style.display = 'none';
    fallback.style.display = 'flex';
  };

  const fallback = document.createElement('div');
  fallback.style.cssText = `width:200px;height:280px;display:none;align-items:center;justify-content:center;font-family:Marcellus,serif;font-size:48px;color:rgba(212,175,55,0.5);background:#0c0306;border-radius:2px;`;
  fallback.textContent = person.name.charAt(0);

  const wrapper = document.createElement('div');
  // pointer-events:none fixes hover detection — prevents CSS3D from blocking WebGL mouse events
  wrapper.style.cssText = 'position:relative;width:200px;height:280px;overflow:hidden;border-radius:2px;pointer-events:none;';
  wrapper.appendChild(imgEl);
  wrapper.appendChild(fallback);

  const cssObj = new CSS3DObject(wrapper);
  cssObj.scale.setScalar(PHOTO_SCALE);
  // World position: CSS3D scene positions are absolute
  cssObj.position.set(x, FCY, z);
  cssObj.rotation.y = angle;
  cssScene.add(cssObj);
  g.userData.cssObj = cssObj;
});

// ─── RAYCASTER ────────────────────────────────────────────────────────
const ray = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hovIdx = -1, selIdx = -1;
const lbl = document.getElementById('lbl');

renderer.domElement.addEventListener('mousemove', e => {
  // Use current window dimensions (not fixed W/H) for correct raycasting after any resize
  const cw = renderer.domElement.clientWidth  || window.innerWidth;
  const ch = renderer.domElement.clientHeight || window.innerHeight;
  mouse.x = (e.clientX / cw) * 2 - 1;
  mouse.y = -(e.clientY / ch) * 2 + 1;
  lbl.style.left = (e.clientX + 14) + 'px';
  lbl.style.top  = (e.clientY - 18) + 'px';
});

let lastClick=-1, lastClickTime=0;
renderer.domElement.addEventListener('click', () => {
  if(hovIdx < 0) return;
  const now=Date.now();
  if(hovIdx===lastClick && now-lastClickTime<450){
    // Double-click → enter 3D room
    window.location.href=`room.html?id=${figures[hovIdx].id}`;
  } else {
    openPanel(hovIdx);
  }
  lastClick=hovIdx; lastClickTime=now;
});

// Stop auto-rotate on user interaction
renderer.domElement.addEventListener('pointerdown', () => {
  controls.autoRotate = false;
});

// ─── FOCUS MODE ──────────────────────────────────────────────────────
const focusUI = document.getElementById('focus-ui');
const focusLink = document.getElementById('btn-detail-link');
const focusGroup = new THREE.Group();
cssScene.add(focusGroup);

let originalCamPos = new THREE.Vector3();
let isFocusing = false;

function openPanel(i) {
  if(isFocusing) return;
  isFocusing = true;
  selIdx = i;
  const p = figures[i];

  // Save camera
  originalCamPos.copy(camera.position);
  controls.autoRotate = false;

  // Move camera to focus (Zoom lại gần như bản đầu: RADIUS-8.5)
  const angle = (i / figures.length) * Math.PI * 2;
  const focusDist = RADIUS - 8.5; 
  const camX = Math.sin(angle) * focusDist;
  const camZ = Math.cos(angle) * focusDist;
  
  camera.userData.targetPos = new THREE.Vector3(camX, 4.2, camZ);
  controls.target.set(Math.sin(angle)*RADIUS, 4.5, Math.cos(angle)*RADIUS);

  // Build 3D Panels
  focusGroup.clear();
  
  // Left Panel: Bio + Metadata
  const bioDiv = document.createElement('div');
  bioDiv.className = 'f-panel';
  const metasHTML = (p.metadata||[]).slice(0,4).map(m=>`
    <div class="f-m-item"><span class="f-m-label">${m.label}</span>${m.value}</div>`).join('');
    
  bioDiv.innerHTML = `
    <div class="f-label">✦ Danh nhân văn hóa</div>
    <div class="f-name">${p.name}</div>
    <div class="f-title">${p.title || p.lifespan}</div>
    <div class="f-quote">${(p.quote||'').replace(/^"|"$/g,'')}</div>
    <div class="f-bio-text">${p.summary || p.bio.substring(0, 350) + '...'}</div>
    <div class="f-meta">${metasHTML}</div>
  `;
  const bioObj = new CSS3DObject(bioDiv);
  bioObj.scale.setScalar(0.012);
  bioObj.position.set(-7.5, 0, 0); // Thu hẹp lại (11 -> 7.5)
  bioObj.rotation.y = 0.35; 
  focusGroup.add(bioObj);

  // Right Panel: Achievements or Infographic
  const achDiv = document.createElement('div');
  
  if (p.infographicImage) {
    // Kiểu dáng riêng cho Infographic: không nền đen, không padding rộng
    achDiv.className = 'f-panel-infographic';
    achDiv.innerHTML = `
      <div class="f-label" style="text-align: center; margin-bottom: 15px;">✦ INFOGRAPHIC</div>
      <div style="overflow: hidden; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); border: 1px solid rgba(212,175,55,0.3);">
        <img src="${p.infographicImage}" style="width: 100%; height: auto; display: block; transition: transform 0.6s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
      </div>
    `;
  } else {
    achDiv.className = 'f-panel';
    const achsHTML = (p.achievements||[]).slice(0,3).map((a,n)=>`
      <div class="f-ach-item">
        <span class="f-ach-num">0${n+1}</span>
        <div class="f-ach-text"><h4>${a.title}</h4><p>${a.desc||''}</p></div>
      </div>`).join('');
    achDiv.innerHTML = `<div class="f-label">✦ Dấu ấn lịch sử tiêu biểu</div><div class="f-ach">${achsHTML}</div>`;
  }
  
  const achObj = new CSS3DObject(achDiv);
  achObj.scale.setScalar(0.012);
  achObj.position.set(7.5, 0, 0); // Thu hẹp lại (11 -> 7.5)
  achObj.rotation.y = -0.35;
  focusGroup.add(achObj);

  // Position whole group in front of target figure
  focusGroup.position.set(Math.sin(angle)*RADIUS, 4.5, Math.cos(angle)*RADIUS);
  focusGroup.lookAt(0, 4.5, 0);
  focusGroup.translateZ(-4.8); // Điều chỉnh lại độ sâu (-3.5 -> -4.8)

  focusLink.href = `detail.html?id=${p.id}`;
  focusUI.classList.add('open');
  
  // Hide hint entirely
  document.getElementById('hint').style.display = 'none';
  updateDots(i);
}

document.getElementById('btn-close-focus').addEventListener('click', (e) => {
  e.stopPropagation();
  closeFocus();
});

function closeFocus() {
  focusUI.classList.remove('open');
  focusGroup.clear();
  camera.userData.targetPos = originalCamPos.clone();
  controls.target.set(0, 4, 0);
  selIdx = -1;
  isFocusing = false;
  // Show hint back
  document.getElementById('hint').style.display = 'block';
  updateDots(-1);
}


// ─── DOTS ─────────────────────────────────────────────────────────────
const dotsEl = document.getElementById('dots');
figures.forEach((p,i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.title = p.name;
  d.addEventListener('click', () => openPanel(i));
  dotsEl.appendChild(d);
});
function updateDots(a){
  Array.from(dotsEl.children).forEach((d,i)=>d.classList.toggle('on',i===a));
}

// ─── ANIMATE ──────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // Camera lerp
  if(camera.userData.targetPos) {
    camera.position.lerp(camera.userData.targetPos, 0.08);
    // Stop lerping once close enough to allow free rotation
    if(camera.position.distanceTo(camera.userData.targetPos) < 0.05) {
      camera.userData.targetPos = null;
    }
  }

  // Center Title Billboard & Float
  if(typeof titleObj !== 'undefined') {
    titleObj.quaternion.copy(camera.quaternion);
    titleObj.position.y = 10 + Math.sin(t * 0.5) * 0.3;
  }

  // Hover
  ray.setFromCamera(mouse, camera);
  const hits = ray.intersectObjects(hitMeshes, false);
  const nh = hits.length > 0 ? hits[0].object.userData.figureIndex : -1;
  if(nh !== hovIdx) {
    hovIdx = nh;
    if(hovIdx >= 0){
      lbl.textContent = figures[hovIdx].name;
      lbl.style.opacity = '1';
      renderer.domElement.style.cursor = 'pointer';
    } else {
      lbl.style.opacity = '0';
      renderer.domElement.style.cursor = 'default';
    }
  }

  // Per-figure animation
  groups.forEach((g, i) => {
    const hover = i === hovIdx;
    const sel = i === selIdx;

    // Float
    g.position.y = Math.sin(t*0.55 + i*1.1) * 0.1;

    // Ring spin
    g.userData.ring.rotation.z = t*0.6 + i;

    // Light boost
    g.userData.pt.intensity += ((hover||sel ? 6 : 3) - g.userData.pt.intensity) * 0.1;

    // Particles
    const pp = g.userData.ppos;
    for(let j=0;j<pp.length/3;j++){
      pp[j*3+1] += 0.007;
      if(pp[j*3+1] > 7.2) pp[j*3+1] = 0;
    }
    g.userData.pts.geometry.attributes.position.needsUpdate = true;

    // Sync CSS3D object float Y with WebGL group
    const FCY = FH/2 + 1.45;
    g.userData.cssObj.position.y = FCY + g.position.y;
  });

  controls.update();
  renderer.render(scene, camera);
  cssRenderer.render(cssScene, camera);
  // Dragon bg
  drawBg(clock.getElapsedTime());
}

// ─── RESIZE ───────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w=innerWidth, h=innerHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  cssRenderer.setSize(w, h);
});

// ─── BACKGROUND CANVAS: Clouds + Dragon ──────────────────────────────
const bgC = document.getElementById('bg-canvas');
bgC.width = innerWidth; bgC.height = innerHeight;
const bgCtx = bgC.getContext('2d');
window.addEventListener('resize', ()=>{ bgC.width=innerWidth; bgC.height=innerHeight; });

function drawBg(t) {
  const w=bgC.width, h=bgC.height;

  // SKY: Golden-tinted dark red gradient
  const skyG = bgCtx.createLinearGradient(0,0,0,h);
  skyG.addColorStop(0,'#1a0202');
  skyG.addColorStop(0.35,'#2e0505');
  skyG.addColorStop(0.65,'#3d1400');
  skyG.addColorStop(0.85,'#4a2000');
  skyG.addColorStop(1,'#3a1800');
  bgCtx.fillStyle=skyG;
  bgCtx.fillRect(0,0,w,h);

  // Golden atmospheric haze bands
  for(let b=0;b<3;b++){
    const by=h*(0.55+b*0.12+Math.sin(t*0.04+b)*.03);
    const hg=bgCtx.createLinearGradient(0,by-60,0,by+60);
    hg.addColorStop(0,'rgba(180,100,0,0)');
    hg.addColorStop(0.5,`rgba(200,120,10,${0.08-b*0.02})`);
    hg.addColorStop(1,'rgba(180,100,0,0)');
    bgCtx.fillStyle=hg;
    bgCtx.fillRect(0,by-60,w,120);
  }

  // Stars (upper half only)
  if(!bgC._stars){
    bgC._stars=Array.from({length:60},()=>({x:Math.random(),y:Math.random()*0.45,s:Math.random()*1.2+.3,sp:Math.random()*.025+.005}));
  }
  bgC._stars.forEach(s=>{
    const a=(Math.sin(t*s.sp*5+s.x*18)*.35+.55)*0.45;
    bgCtx.fillStyle=`rgba(255,235,170,${a})`;
    bgCtx.beginPath(); bgCtx.arc(s.x*w,s.y*h,s.s,0,Math.PI*2); bgCtx.fill();
  });

  // AUSPICIOUS GOLDEN CLOUDS (祥云) — floating at bottom
  function drawCloud(cx,cy,sc,al){
    bgCtx.save();
    bgCtx.globalAlpha=al;
    // Main puffs (5 circles forming cloud shape)
    [
      [0,0,sc],[sc*1.1,sc*.15,sc*.82],[sc*2.2,sc*.05,sc*.92],
      [sc*-.85,sc*.22,sc*.72],[sc*3.1,sc*.18,sc*.7]
    ].forEach(([dx,dy,r])=>{
      const pf=bgCtx.createRadialGradient(cx+dx,cy+dy,0,cx+dx,cy+dy,r);
      pf.addColorStop(0,'rgba(255,220,50,0.95)');
      pf.addColorStop(0.45,'rgba(225,165,15,0.75)');
      pf.addColorStop(0.8,'rgba(180,110,0,0.3)');
      pf.addColorStop(1,'rgba(140,70,0,0)');
      bgCtx.beginPath(); bgCtx.arc(cx+dx,cy+dy,r,0,Math.PI*2); bgCtx.fill();
    });
    // Swirl stroke decorations
    bgCtx.strokeStyle='rgba(160,95,0,0.55)';
    bgCtx.lineWidth=1.6;
    bgCtx.beginPath(); bgCtx.arc(cx-sc*.48,cy+sc*.32,sc*.27,Math.PI*.15,Math.PI*1.6); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(cx+sc*1.52,cy+sc*.28,sc*.23,Math.PI*-.05,Math.PI*1.35); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.arc(cx+sc*2.85,cy+sc*.26,sc*.21,Math.PI*.08,Math.PI*1.42); bgCtx.stroke();
    // Tail wisps
    bgCtx.strokeStyle='rgba(195,135,8,0.45)';
    bgCtx.lineWidth=1.3;
    bgCtx.beginPath(); bgCtx.moveTo(cx-sc*.85,cy+sc*.52); bgCtx.bezierCurveTo(cx-sc*1.25,cy+sc*.72,cx-sc*1.6,cy+sc*.62,cx-sc*2.0,cy+sc*.52); bgCtx.stroke();
    bgCtx.beginPath(); bgCtx.moveTo(cx+sc*3.1,cy+sc*.5); bgCtx.bezierCurveTo(cx+sc*3.4,cy+sc*.72,cx+sc*3.75,cy+sc*.62,cx+sc*4.1,cy+sc*.52); bgCtx.stroke();
    bgCtx.restore();
  }

  // 6 cloud groups at bottom, each drifting at different speed
  [
    {bx:-.05, by:.80, sc:30, sp:.016, amp:.028},
    {bx:.22,  by:.86, sc:24, sp:.021, amp:.022},
    {bx:.45,  by:.82, sc:34, sp:.014, amp:.030},
    {bx:.68,  by:.85, sc:26, sp:.019, amp:.025},
    {bx:.88,  by:.81, sc:22, sp:.023, amp:.020},
    {bx:1.08, by:.88, sc:28, sp:.017, amp:.026},
  ].forEach((cd,ci)=>{
    const cx=(cd.bx + Math.sin(t*cd.sp+ci*1.4)*cd.amp)*w;
    const cy=cd.by*h + Math.cos(t*cd.sp*.6+ci)*cd.amp*.25*h;
    drawCloud(cx - cd.sc*1.5, cy, cd.sc, 0.68+Math.sin(t*0.06+ci)*.1);
  });
}

// ─── START ────────────────────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('loading').classList.add('hide');
  animate();
}, 900);
</script>
