<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tinh Hoa Việt - Di Sản Nghìn Năm</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Marcellus&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#690008",
            "accent": "#d4af37",
            "background": "#4a0404", // Deep red background
            "surface": "#fcf9f0",   // Light surface for cards
          },
          fontFamily: {
            "headline": ["Marcellus", "serif"],
            "body": ["Outfit", "sans-serif"],
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #4a0404;
      color: #fcf9f0;
      font-family: 'Outfit', sans-serif;
    }

    .card-element {
      background-color: #fcf9f0;
      color: #1c1c17;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }

    .card-element:hover {
      transform: translateY(-8px);
      border: 3px solid #d4af37;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .serif-text {
      font-family: 'Marcellus', serif;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

<body class="flex flex-col min-h-screen">
  
  <!-- Header with Favicon Logo -->
  <header class="w-full bg-[#1a0505] border-b border-[#d4af37]/30 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <img src="favicon.png" alt="Logo" class="w-10 h-10 object-contain">
        <div>
          <h1 class="text-xl font-headline font-bold text-accent tracking-widest leading-none">TINH HOA VIỆT</h1>
          <p id="stat-counter" class="text-[9px] uppercase tracking-widest text-[#d4af37]/60 font-bold mt-1">Hành trình di sản</p>
        </div>
      </a>
      <div class="hidden md:flex gap-8 text-[11px] font-bold uppercase tracking-widest text-[#fcf9f0]/70">
        <a href="#" class="hover:text-accent transition-colors">Trang chủ</a>
        <a href="#" class="hover:text-accent transition-colors">Tài liệu</a>
        <a href="#" class="hover:text-accent transition-colors">Liên hệ</a>
      </div>
    </div>
  </header>

  <main class="flex-1 w-full max-w-7xl mx-auto px-6 py-16">
    <!-- Hero Title -->
    <div class="text-center mb-16">
      <h2 class="serif-text text-5xl md:text-7xl font-bold text-white mb-4 drop-shadow-lg">Tinh Hoa Việt</h2>
      <p class="text-[#d4af37] text-lg font-light tracking-wide italic">Bản sắc nghìn năm trong tầm tay bạn</p>
    </div>

    <!-- The Grid - Pure and Simple like at the beginning -->
    <div id="card-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
       <!-- Cards load here -->
    </div>
  </main>

  <footer class="bg-[#1a0505] py-12 border-t border-[#d4af37]/20 text-center">
    <p class="text-[#d4af37]/60 text-[10px] uppercase tracking-[0.3em] font-bold">© 2026 VIETNAMESE FIGURES - TINH HOA VIỆT</p>
  </footer>

  <script src="data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const grid = document.getElementById('card-grid');
      const counter = document.getElementById('stat-counter');
      
      if (typeof danhNhanData === 'undefined' || !Array.isArray(danhNhanData)) {
        grid.innerHTML = '<p class="col-span-full text-center text-accent py-20">Lỗi: Không tìm thấy dữ liệu danh nhân.</p>';
        return;
      }

      function parseYear(lifespan) {
        if (!lifespan) return 9999;
        const matches = lifespan.toString().match(/\d{3,4}/);
        return matches ? parseInt(matches[0], 10) : 9999;
      }

      const sortedData = [...danhNhanData].sort((a, b) => parseYear(a.lifespan) - parseYear(b.lifespan));
      counter.innerHTML = `Đã hiển thị ${sortedData.length} danh nhân tiêu biểu`;

      sortedData.forEach(p => {
        if (!p || !p.id) return;

        const card = document.createElement('a');
        card.href = `detail.html?id=${p.id}`;
        card.className = "card-element rounded-xl overflow-hidden flex flex-col shadow-2xl";
        
        const image = p.image || p.headerAvatar || p.avatar || "placeholder.jpg";
        const name = p.name || "Danh nhân";
        const lifespan = p.lifespan || "Lịch sử";
        const title = p.title || "Văn hóa Việt";
        const quote = p.quote ? p.quote.toString().replace(/^"|"$/g, '') : "Để lại di sản cho muôn đời sau...";

        card.innerHTML = `
          <div class="h-64 w-full relative">
            <img src="${image}" alt="${name}" class="w-full h-full object-cover ${p.imagePosition || 'object-center'}">
            <div class="absolute bottom-0 left-0 bg-accent text-black px-3 py-1 text-[9px] font-bold uppercase tracking-widest">
              ${title}
            </div>
          </div>
          <div class="p-6 flex flex-col flex-1">
            <h3 class="serif-text text-2xl font-bold mb-1">${name}</h3>
            <p class="text-[11px] font-bold text-gray-500 uppercase tracking-widest mb-4">${lifespan}</p>
            <div class="h-px w-8 bg-accent mb-4"></div>
            <p class="text-sm font-light italic text-gray-700 line-clamp-2 leading-relaxed">
              "${quote}"
            </p>
            <div class="mt-auto pt-6 flex items-center text-[10px] font-bold uppercase text-accent group">
              Xem chi tiết <span class="material-symbols-outlined text-[14px] ml-1">arrow_forward</span>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    });
  </script>
</body>
</html>
