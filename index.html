<!DOCTYPE html>
<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tinh Hoa Việt - Tiểu sử</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400;1,600&amp;family=Manrope:wght@400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6",
            "primary-fixed": "#ffdad6",
            "surface-bright": "#fcf9f0",
            "on-tertiary-container": "#dcac7f",
            "on-secondary-fixed": "#2b1611",
            "surface-container-low": "#f6f3ea",
            "on-surface-variant": "#58413f",
            "on-error-container": "#93000a",
            "background": "#fcf9f0",
            "on-surface": "#1c1c17",
            "secondary-fixed-dim": "#e5beb5",
            "primary": "#690008",
            "tertiary-fixed-dim": "#eebd8e",
            "inverse-on-surface": "#f4f1e8",
            "inverse-primary": "#ffb3ac",
            "on-background": "#1c1c17",
            "surface-tint": "#ac322e",
            "tertiary-container": "#61401b",
            "surface-container": "#f1eee5",
            "outline": "#8c716e",
            "tertiary": "#472a07",
            "surface-container-high": "#ebe8df",
            "on-tertiary-fixed-variant": "#61401b",
            "surface-dim": "#dddad1",
            "primary-container": "#8b1a1a",
            "primary-fixed-dim": "#ffb3ac",
            "tertiary-fixed": "#ffdcbd",
            "on-primary-fixed": "#410003",
            "error": "#ba1a1a",
            "surface": "#fcf9f0",
            "surface-container-lowest": "#ffffff",
            "on-secondary-fixed-variant": "#5c403a",
            "inverse-surface": "#31312b",
            "secondary-fixed": "#ffdad2",
            "on-primary-fixed-variant": "#8a1a1a",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#2c1600",
            "on-primary-container": "#ff9a91",
            "outline-variant": "#e0bfbc",
            "on-error": "#ffffff",
            "surface-variant": "#e5e2da",
            "surface-container-highest": "#e5e2da",
            "on-secondary": "#ffffff",
            "secondary": "#755750",
            "on-secondary-container": "#7a5b54",
            "secondary-container": "#ffd7ce",
            "on-tertiary": "#ffffff"
          },
          fontFamily: {
            "headline": ["Newsreader", "serif"],
            "body": ["Manrope", "sans-serif"],
            "label": ["Manrope", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #fcf9f0;
      color: #1c1c17;
      font-family: 'Manrope', sans-serif;
    }

    .serif-text {
      font-family: 'Newsreader', serif;
    }

    /* Page Transition Animation CSS */
    .page-transition {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease-out;
    }

    .page-transition.loaded {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body class="bg-background">
  <!-- TopNavBar -->
  <nav
    class="flex justify-between items-center px-8 py-4 w-full sticky top-0 bg-[#fcf9f0] dark:bg-stone-900/90 z-50 backdrop-blur-md border-b border-outline-variant/10">
    <a href="index.html"
      class="text-2xl font-serif font-bold text-[#690008] dark:text-[#8b1a1a] tracking-tight hover:opacity-80 transition-opacity">Tinh
      Hoa Việt</a>
    <div class="hidden md:flex gap-8 items-center">
      <a id="nav-bio"
        class="cursor-pointer text-[#690008] dark:text-[#8b1a1a] font-bold border-b-2 border-[#690008] pb-1 font-sans text-sm tracking-wide">Tiểu
        sử & Dấu ấn</a>
      <a id="nav-chat"
        class="cursor-pointer text-stone-600 dark:text-stone-400 font-medium hover:text-[#690008] transition-colors duration-300 font-sans text-sm tracking-wide">Hỏi đáp cùng AI</a>
    </div>
    <div class="flex items-center gap-4">
    </div>
  </nav>

  <div class="flex">
    <!-- SideNavBar -->
    <aside
      class="fixed left-0 top-16 h-[calc(100vh-64px)] flex flex-col py-6 bg-[#f6f3ea] dark:bg-stone-800 w-72 border-r-0 z-40">
      <div class="px-8 mb-8">
        <h2 class="font-serif text-[#472a07] text-xl font-bold">Danh Nhân Văn Hóa</h2>
        <p class="font-sans text-xs text-stone-500 uppercase tracking-widest mt-1">Hành trình di sản</p>
      </div>
      <nav id="sidebar-nav" class="flex-1 space-y-1">
        <!-- Rendered by JS -->
      </nav>
      <div class="px-8 mt-6">
        <a href="https://drive.google.com/drive/folders/1u1PUQ-UHbtnL9kOroOGd_TjLoGlPvR9e?usp=drive_link"
          target="_blank"
          class="block text-center w-full py-3 bg-surface-container-high text-on-surface text-sm font-bold rounded-lg transition-transform hover:bg-[#e5e2da] active:scale-95">
          Khám phá Kho lưu trữ
        </a>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content" class="ml-72 flex-1 p-12 max-w-7xl mx-auto page-transition">
      <!-- Hero Section -->
      <header class="mb-16 relative overflow-hidden flex flex-col items-center text-center">
        <div
          class="absolute -top-24 -right-24 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl pointer-events-none">
        </div>
        <h1 id="hero-name" class="serif-text text-8xl font-bold text-primary mb-6 tracking-tight"></h1>
        <div class="flex items-center gap-4 mb-8">
          <div class="h-px w-12 bg-outline-variant/40"></div>
          <span id="hero-title"
            class="font-sans text-secondary font-semibold tracking-[0.2em] uppercase text-xs"></span>
          <div class="h-px w-12 bg-outline-variant/40"></div>
        </div>
        <blockquote class="max-w-2xl mx-auto">
          <p id="hero-quote" class="serif-text italic text-2xl text-tertiary leading-relaxed"></p>
        </blockquote>
      </header>

      <!-- Navigation Tabs -->
      <div class="flex justify-center mb-16 border-b border-outline-variant/20">
        <div class="flex gap-12">
          <button class="pb-4 border-b-2 border-primary text-primary font-bold text-sm tracking-wide">TIỂU SỬ</button>
          <a id="tab-chat-link"
            class="cursor-pointer pb-4 border-b-2 border-transparent text-stone-400 hover:text-stone-600 font-bold text-sm tracking-wide transition-colors">HỎI ĐÁP CÙNG AI</a>
        </div>
      </div>

      <!-- Bento Grid Content -->
      <div class="grid grid-cols-12 gap-8">
        <!-- Biography Column -->
        <section class="col-span-12 lg:col-span-7 space-y-8">
          <div
            class="bg-surface-container-lowest p-10 rounded-xl border border-outline-variant/10 shadow-[0px_12px_32px_rgba(28,28,23,0.04)]">
            <div class="flex items-center gap-3 mb-6">
              <span class="material-symbols-outlined text-primary-container">history</span>
              <h3 id="bio-title" class="serif-text text-3xl font-bold text-primary"></h3>
            </div>
            <p id="bio-desc" class="font-sans text-stone-700 leading-relaxed text-lg mb-6"></p>
            <div class="grid grid-cols-2 gap-6 mt-8">
              <div class="bg-surface-container-low p-6 rounded-lg">
                <span class="text-xs font-bold text-secondary uppercase tracking-widest block mb-2">Sinh thời</span>
                <span id="bio-lifespan" class="serif-text text-xl text-primary font-semibold"></span>
              </div>
              <div class="bg-surface-container-low p-6 rounded-lg">
                <span class="text-xs font-bold text-secondary uppercase tracking-widest block mb-2">Quê quán</span>
                <span id="bio-hometown" class="serif-text text-xl text-primary font-semibold"></span>
              </div>
            </div>
          </div>
          <div class="relative group overflow-hidden rounded-xl h-80">
            <img id="image-element"
              class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" src=""
              alt="Hero Image" />
            <div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent flex items-end p-8">
              <div>
                <span id="image-caption-title"
                  class="bg-secondary-container text-on-secondary-container text-[10px] font-bold px-3 py-1 rounded-full uppercase mb-3 inline-block"></span>
                <h4 id="image-title" class="serif-text text-white text-2xl font-bold"></h4>
                <p id="image-desc" class="text-white/80 text-sm mt-1"></p>
              </div>
            </div>
          </div>
        </section>

        <!-- Legacy Column -->
        <section class="col-span-12 lg:col-span-5 space-y-8">
          <div class="bg-primary p-10 rounded-xl text-white">
            <div class="flex items-center gap-3 mb-6">
              <span class="material-symbols-outlined text-primary-fixed"
                style="font-variation-settings: 'FILL' 1;">bookmark_heart</span>
              <h3 class="serif-text text-3xl font-bold">Dấu ấn Lịch sử</h3>
            </div>
            <ul id="achievements-list" class="space-y-6">
              <!-- Rendered by JS -->
            </ul>
          </div>

          <div class="bg-surface-container p-8 rounded-xl border border-outline-variant/10">
            <div class="flex items-center justify-between mb-6">
              <h4 class="serif-text text-xl font-bold text-tertiary">Câu hỏi thường gặp</h4>
              <span class="material-symbols-outlined text-stone-400">lightbulb</span>
            </div>
            <div id="faq-list" class="space-y-4">
              <!-- Rendered by JS -->
            </div>
          </div>
        </section>
      </div>

      <!-- Footer -->
      <footer
        class="mt-20 pt-8 border-t border-outline-variant/10 flex justify-between items-center text-stone-400 text-xs tracking-widest uppercase font-bold">
        <div>© 2026 TINH HOA VIỆT - DI SẢN VĂN HÓA</div>
        <div class="flex gap-6">
          <a class="hover:text-primary transition-colors" href="#">Tài liệu tham khảo</a>
          <a class="hover:text-primary transition-colors" href="#">Bản quyền nội dung</a>
        </div>
      </footer>
    </main>
  </div>

  <button id="float-chat-btn"
    class="fixed bottom-8 right-8 w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50 group">
    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">chat</span>
    <span
      class="absolute right-16 bg-white text-primary px-4 py-2 rounded-lg text-xs font-bold shadow-lg opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity pointer-events-none">Hỏi
      AI về Danh Nhân</span>
  </button>

  <!-- Load Data and Logic -->
  <script src="data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Parse URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      let currentId = urlParams.get('id');

      // Default to chu-van-an if no ID is found or invalid
      let person = danhNhanData.find(p => p.id === currentId);
      if (!person) {
        currentId = danhNhanData[0].id; // Fallback to first one
        person = danhNhanData[0];
        // Modify URL without reloading to reflect default ID
        window.history.replaceState({}, '', `?id=${currentId}`);
      }

      document.title = `Tinh Hoa Việt - ${person.name}`;

      // Smooth Page Transition setup
      const mainContent = document.getElementById('main-content');

      // Navigate gently function
      window.smoothNavigate = function (url) {
        mainContent.classList.remove('loaded');
        setTimeout(() => {
          window.location.href = url;
        }, 300); // match transition timing in CSS
      };

      // Set TopNav and Tab hrefs
      document.getElementById('nav-bio').onclick = () => smoothNavigate(`index.html?id=${currentId}`);
      document.getElementById('nav-chat').onclick = () => smoothNavigate(`code_chatbot.html?id=${currentId}`);
      document.getElementById('tab-chat-link').onclick = () => smoothNavigate(`code_chatbot.html?id=${currentId}`);
      document.getElementById('float-chat-btn').onclick = () => smoothNavigate(`code_chatbot.html?id=${currentId}`);

      // 1. Render Sidebar
      const sidebarNav = document.getElementById('sidebar-nav');
      danhNhanData.forEach(p => {
        const isActive = p.id === currentId;
        const a = document.createElement('a');

        if (isActive) {
          a.className = "cursor-pointer bg-[#ffffff] dark:bg-stone-700 text-[#690008] dark:text-white rounded-l-full ml-4 shadow-sm flex items-center px-6 py-3 transition-all duration-200";
        } else {
          a.className = "cursor-pointer text-stone-500 dark:text-stone-400 hover:translate-x-1 hover:bg-[#f1eee5] dark:hover:bg-stone-700 transition-all duration-200 flex items-center px-6 py-3 ml-4";
        }

        a.innerHTML = `
          <span class="material-symbols-outlined mr-3 text-lg">${p.sidebarIcon}</span>
          <span class="font-sans text-sm font-semibold">${p.name}</span>
        `;

        a.onclick = (e) => {
          e.preventDefault();
          if (p.id !== currentId) {
            smoothNavigate(`index.html?id=${p.id}`);
          }
        };
        sidebarNav.appendChild(a);
      });

      // 2. Render Main Content Fields
      document.getElementById('hero-name').textContent = person.name;
      document.getElementById('hero-title').textContent = person.title;
      document.getElementById('hero-quote').textContent = person.quote;

      document.getElementById('bio-title').textContent = person.bioTitle;
      document.getElementById('bio-desc').textContent = person.bio;
      document.getElementById('bio-lifespan').textContent = person.lifespan;
      document.getElementById('bio-hometown').textContent = person.hometown;

      const imgEl = document.getElementById('image-element');
      imgEl.src = person.image;
      imgEl.className = `w-full h-full object-cover transition-transform duration-700 group-hover:scale-105 ${person.imagePosition || ""}`;
      document.getElementById('image-caption-title').textContent = person.imageCaptionTitle;
      document.getElementById('image-title').textContent = person.imageTitle;
      document.getElementById('image-desc').textContent = person.imageDesc;

      // 3. Render Achievements
      const achList = document.getElementById('achievements-list');
      person.achievements.forEach((ach, index) => {
        const li = document.createElement('li');
        li.className = "flex gap-4";
        li.innerHTML = `
          <span class="serif-text text-primary-fixed text-4xl font-bold opacity-40">0${index + 1}</span>
          <div>
            <h5 class="font-sans font-bold text-lg mb-1">${ach.title}</h5>
            <p class="text-white/70 text-sm leading-relaxed">${ach.desc}</p>
          </div>
        `;
        achList.appendChild(li);
      });

      // 4. Render FAQs
      const faqList = document.getElementById('faq-list');
      person.faqs.forEach(faq => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 bg-surface-container-lowest rounded-lg text-sm font-semibold text-stone-700 hover:text-primary transition-colors flex justify-between items-center group";
        // Click to jump to AI Chatbot section
        btn.onclick = () => smoothNavigate(`code_chatbot.html?id=${currentId}&q=${encodeURIComponent(faq)}`);
        btn.innerHTML = `
          <span>${faq}</span>
          <span class="material-symbols-outlined text-xs group-hover:translate-x-1 transition-transform">arrow_forward</span>
        `;
        faqList.appendChild(btn);
      });

      // Trigger fade-in animation
      setTimeout(() => {
        mainContent.classList.add('loaded');
      }, 50);
    });
  </script>
</body>

</html>
