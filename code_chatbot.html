<!DOCTYPE html>
<html class="light" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Hỏi đáp cùng AI - Tinh Hoa Việt</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;family=Manrope:wght@200..800&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "error-container": "#ffdad6",
            "primary-fixed": "#ffdad6",
            "surface-bright": "#fcf9f0",
            "on-tertiary-container": "#dcac7f",
            "on-secondary-fixed": "#2b1611",
            "surface-container-low": "#f6f3ea",
            "on-surface-variant": "#58413f",
            "on-error-container": "#93000a",
            "background": "#fcf9f0",
            "on-surface": "#1c1c17",
            "secondary-fixed-dim": "#e5beb5",
            "primary": "#690008",
            "tertiary-fixed-dim": "#eebd8e",
            "inverse-on-surface": "#f4f1e8",
            "inverse-primary": "#ffb3ac",
            "on-background": "#1c1c17",
            "surface-tint": "#ac322e",
            "tertiary-container": "#61401b",
            "surface-container": "#f1eee5",
            "outline": "#8c716e",
            "tertiary": "#472a07",
            "surface-container-high": "#ebe8df",
            "on-tertiary-fixed-variant": "#61401b",
            "surface-dim": "#dddad1",
            "primary-container": "#8b1a1a",
            "primary-fixed-dim": "#ffb3ac",
            "tertiary-fixed": "#ffdcbd",
            "on-primary-fixed": "#410003",
            "error": "#ba1a1a",
            "surface": "#fcf9f0",
            "surface-container-lowest": "#ffffff",
            "on-secondary-fixed-variant": "#5c403a",
            "inverse-surface": "#31312b",
            "secondary-fixed": "#ffdad2",
            "on-primary-fixed-variant": "#8a1a1a",
            "on-primary": "#ffffff",
            "on-tertiary-fixed": "#2c1600",
            "on-primary-container": "#ff9a91",
            "outline-variant": "#e0bfbc",
            "on-error": "#ffffff",
            "surface-variant": "#e5e2da",
            "surface-container-highest": "#e5e2da",
            "on-secondary": "#ffffff",
            "secondary": "#755750",
            "on-secondary-container": "#7a5b54",
            "secondary-container": "#ffd7ce",
            "on-tertiary": "#ffffff"
          },
          fontFamily: {
            "headline": ["Newsreader", "serif"],
            "body": ["Manrope", "sans-serif"],
            "label": ["Manrope", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    /* Standard Typography sync with Detail page */
    .font-serif-premium { font-family: 'Newsreader', serif; }
    .font-sans-premium { font-family: 'Manrope', sans-serif; }

    body {
      font-family: 'Manrope', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Chat bubble content optimization */
    .chat-text-content {
      font-size: 16px;
      line-height: 1.7;
      color: #333;
    }
    .dark .chat-text-content { color: #e5e7eb; }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Page Transition Animation CSS */
    .page-transition {
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease-out;
    }

    .page-transition.loaded {
      opacity: 1;
      transform: translateY(0);
    }

    /* Typing Indicator Animation */
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--primary);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-indicator span:nth-child(1) {
      animation-delay: -0.32s;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: -0.16s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    /* Custom Scrollbar cho Tabs & Sidebar */
    .custom-scrollbar::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent; 
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(139, 26, 26, 0.4); 
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(139, 26, 26, 0.8); 
    }
  </style>
</head>

<body class="bg-background text-on-background font-body">
  <!-- TopNavBar -->
  <header
    class="flex justify-between items-center px-8 py-4 w-full sticky top-0 bg-[#fcf9f0] dark:bg-stone-900/90 backdrop-blur-md z-50 border-b border-outline-variant/10">
    <a href="index.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
      <img src="favicon.png" alt="Logo" class="w-8 h-8 object-contain">
      <span class="text-2xl font-serif font-bold text-[#690008] dark:text-[#8b1a1a] tracking-tight">TINH HOA VIỆT</span>
    </a>
    <nav class="hidden md:flex space-x-8">
      <a id="nav-bio"
        class="cursor-pointer text-stone-600 dark:text-stone-400 font-bold hover:text-[#690008] transition-colors duration-300 font-sans text-[14px] uppercase tracking-[0.2em]">TIỂU SỬ & DẤU ẤN</a>
      <a id="nav-chat"
        class="cursor-pointer text-[#690008] dark:text-[#8b1a1a] font-bold border-b-2 border-[#690008] pb-1 font-sans text-[14px] uppercase tracking-[0.2em]">HỎI ĐÁP CÙNG AI</a>
    </nav>
    <div class="flex items-center space-x-4">
    </div>
  </header>

  <div class="flex flex-col lg:flex-row min-h-[calc(100vh-64px)] relative">
    <!-- SideNavBar -->
    <aside
      class="sticky top-[60px] md:top-[68px] lg:fixed lg:left-0 lg:top-16 lg:h-[calc(100vh-64px)] lg:w-72 w-full flex lg:flex-col py-3 lg:py-6 bg-[#f6f3ea] dark:bg-stone-800 lg:bg-gradient-to-r lg:from-transparent lg:to-[#f1eee5] z-40 border-b border-outline-variant/20 lg:border-none">
      <div class="hidden lg:block px-6 mb-8">
        <h2 class="font-serif text-lg text-[#472a07] italic">Danh Nhân Văn Hóa</h2>
        <p class="text-xs font-sans font-semibold uppercase tracking-widest text-secondary opacity-70">Hành trình di sản
        </p>
      </div>
      <nav id="sidebar-nav" class="flex flex-row lg:flex-col flex-1 lg:space-y-1 overflow-x-auto lg:overflow-x-visible items-center lg:items-stretch custom-scrollbar px-4 lg:px-0 gap-3 lg:gap-0">
        <!-- Rendered by JS -->
      </nav>
      <div class="hidden lg:block mt-auto px-6 pt-6 border-t border-outline-variant/20">
        <a href="https://drive.google.com/drive/folders/1u1PUQ-UHbtnL9kOroOGd_TjLoGlPvR9e?usp=drive_link"
          target="_blank"
          class="w-full py-3 px-4 bg-primary text-on-primary rounded-md text-sm font-semibold tracking-wide hover:opacity-90 transition-opacity flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">archive</span> Khám phá Kho lưu trữ
        </a>
      </div>
    </aside>

    <!-- Main Chat Canvas -->
    <main id="main-content" class="flex-1 lg:ml-72 flex flex-col relative bg-surface page-transition w-full max-w-full">
      <!-- Chat Header -->
      <div
        class="h-16 px-8 flex items-center justify-between bg-surface-container-low border-b border-outline-variant/10">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full flex items-center justify-center">
            <img id="header-avatar" alt="Portrait"
              class="w-full h-full rounded-full object-cover border border-primary/20 shadow-sm" src="" />
          </div>
          <div>
            <h1 class="font-headline text-2xl text-primary font-bold tracking-tight">Trợ lý AI Tinh Hoa Việt</h1>
            <p id="header-role" class="text-[14px] uppercase tracking-[0.2em] text-secondary font-bold opacity-70"></p>
          </div>
        </div>
        <div class="flex gap-2">
          <button class="p-2 text-secondary hover:bg-surface-container transition-colors rounded-full">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </div>

      <!-- Messages Area -->
      <div id="chat-messages" class="flex-1 overflow-y-auto p-8 space-y-8 scrollbar-hide">
        <!-- Initial Greetings populated by JS -->
      </div>

      <!-- Suggested Questions -->
      <div id="chat-suggestions" class="flex flex-wrap gap-2 max-w-3xl mx-auto w-full pt-4 px-8 mb-2">
        <!-- Rendered by JS -->
      </div>

      <!-- Input Area -->
      <div class="p-6 bg-surface-container-low/50 backdrop-blur-sm z-10 w-full static mt-auto">
        <div class="max-w-3xl mx-auto relative group">
          <div
            class="absolute inset-0 bg-primary/5 rounded-xl blur-lg opacity-0 group-focus-within:opacity-100 transition-opacity">
          </div>
          <div id="character-flyout" class="absolute bottom-full left-0 mb-4 bg-surface-container-highest/90 backdrop-blur-md border border-outline-variant/30 rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] p-2 hidden flex gap-2 animate-in fade-in slide-in-from-bottom-2 duration-200 overflow-x-auto max-w-[calc(100vw-48px)] scrollbar-hide z-50">
          </div>
          <!-- Autocomplete Popup -->
          <div id="autocomplete-popup" class="absolute bottom-full left-0 right-0 mb-4 bg-surface-container-lowest border border-outline-variant/30 rounded-xl shadow-xl p-2 hidden flex-col gap-1 z-40 max-h-60 overflow-y-auto animate-in fade-in slide-in-from-bottom-2 duration-200">
          </div>
          <div
            class="relative flex items-center bg-surface-container-lowest border border-outline/40 focus-within:border-primary transition-all p-2 rounded-xl shadow-sm">
            <button id="character-switch-btn" class="p-2 text-outline hover:text-primary transition-colors focus:outline-none" title="Chuyển đổi danh nhân">
              <span id="input-person-icon" class="material-symbols-outlined"></span>

              class="flex-1 bg-transparent border-none outline-none focus:ring-0 text-sm py-3 px-4 font-body placeholder:text-outline/60"
              placeholder="Hỏi thêm về danh nhân..." type="text" autocomplete="off" />
            <div class="flex items-center gap-2 px-2">
              <button id="chat-send-btn"
                class="w-10 h-10 bg-primary text-on-primary rounded-lg flex items-center justify-center hover:opacity-90 active:scale-95 transition-all">
                <span class="material-symbols-outlined">send</span>
              </button>
            </div>
          </div>
          <p class="text-[10px] text-center mt-3 text-outline/60 font-medium">Sử dụng AI để khám phá chiều sâu lịch sử
            Việt Nam. Thông tin có tính chất tham khảo học thuật.</p>
        </div>
      </div>


    </main>
  </div>

  <script src="data.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Data Initialization
      const urlParams = new URLSearchParams(window.location.search);
      let currentId = urlParams.get('id');

      let person = danhNhanData.find(p => p.id === currentId);
      if (!person) {
        currentId = danhNhanData[0].id;
        person = danhNhanData[0];
        window.history.replaceState({}, '', `?id=${currentId}`);
      }

      document.title = `Hỏi đáp cùng AI - ${person.name}`;

      // Navigate gently function
      const mainContent = document.getElementById('main-content');
      window.smoothNavigate = function (url) {
        mainContent.classList.remove('loaded');
        setTimeout(() => {
          window.location.href = url;
        }, 300);
      };

      // Set Nav links
      document.getElementById('nav-bio').onclick = () => smoothNavigate(`detail.html?id=${currentId}`);
      document.getElementById('nav-chat').onclick = () => smoothNavigate(`code_chatbot.html?id=${currentId}`);

      // 2. Render Sidebar
      const sidebarNav = document.getElementById('sidebar-nav');
      danhNhanData.forEach(p => {
        const isActive = p.id === currentId;
        const a = document.createElement('a');

        if (isActive) {
          a.className = "cursor-pointer bg-[#ffffff] dark:bg-stone-700 text-[#690008] dark:text-white lg:rounded-l-full rounded-full shrink-0 lg:ml-4 shadow-sm flex items-center px-4 py-3 lg:px-8 lg:py-4 transition-all duration-200 border border-outline-variant/10 lg:border-none";
        } else {
          a.className = "cursor-pointer text-stone-500 dark:text-stone-400 hover:translate-y-[1px] lg:hover:translate-y-0 lg:hover:translate-x-1 hover:bg-[#f1eee5] dark:hover:bg-stone-700 transition-all duration-200 flex items-center px-4 py-3 lg:px-8 lg:py-4 lg:ml-4 shrink-0 rounded-full lg:rounded-l-full bg-surface-container-high/50 lg:bg-transparent";
        }

        a.innerHTML = `
          <div class="w-8 h-8 lg:w-10 lg:h-10 rounded-md overflow-hidden ring-1 ring-black/10 shrink-0 mr-3 shadow-sm bg-white">
            <img src="${p.headerAvatar || p.avatar}" class="w-full h-full object-cover">
          </div>
          <span class="font-sans text-[16px] font-bold whitespace-nowrap">${p.name}</span>
        `;

        a.onclick = (e) => {
          e.preventDefault();
          if (p.id !== currentId) smoothNavigate(`code_chatbot.html?id=${p.id}`);
        };
        sidebarNav.appendChild(a);
      });

      // 3. Render Header and Flyout Menu
      const headerAvatar = document.getElementById('header-avatar');
      headerAvatar.src = person.headerAvatar;
      headerAvatar.className = `w-full h-full rounded-full object-cover border border-primary/20 shadow-sm ${person.imagePosition || ""}`;
      document.getElementById('header-role').textContent = person.chatRole;
      document.getElementById('input-person-icon').textContent = person.sidebarIcon;

      // Render Character Flyout (Input switch menu)
      const characterFlyout = document.getElementById('character-flyout');
      danhNhanData.forEach(p => {
         const btn = document.createElement('button');
         const isAct = p.id === currentId;
         btn.className = `w-10 h-10 flex-shrink-0 rounded-full border-2 ${isAct ? 'border-primary shadow-md scale-110 ring-2 ring-primary/20' : 'border-transparent opacity-60 hover:opacity-100 hover:scale-110 active:scale-95'} transition-all overflow-hidden bg-white cursor-pointer ml-1 first:ml-0`;
         btn.innerHTML = `<img src="${p.headerAvatar || p.avatar}" class="w-full h-full object-cover" title="${p.name}" alt="${p.name}"/>`;
         btn.onclick = () => {
             if (!isAct) smoothNavigate(`code_chatbot.html?id=${p.id}`);
         };
         characterFlyout.appendChild(btn);
      });

      // Toggle Flyout Menu
      const switchBtn = document.getElementById('character-switch-btn');
      switchBtn.onclick = (e) => {
         e.stopPropagation();
         characterFlyout.classList.toggle('hidden');
      };
      document.addEventListener('click', (e) => {
         if (!characterFlyout.classList.contains('hidden') && !characterFlyout.contains(e.target) && !switchBtn.contains(e.target)) {
             characterFlyout.classList.add('hidden');
         }
      });

      // 4. Initial AI Message Setup
      const chatMessagesBox = document.getElementById('chat-messages');

      function addAIBubble(htmlContent) {
        const bubble = document.createElement('div');
        bubble.className = "flex flex-col items-start animate-in slide-in-from-left-4 duration-700 mt-6";
        bubble.innerHTML = `
          <div class="flex gap-4 items-start max-w-[85%]">
            <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1">
              <img alt="Avatar" class="w-full h-full rounded-full object-cover border border-primary/20 shadow-sm ${person.imagePosition || ''}" src="${person.chatAvatar}" />
            </div>
            <div class="bg-surface-container-lowest border border-outline-variant/10 p-6 rounded-xl rounded-tl-none shadow-[0px_12px_32px_rgba(28,28,23,0.06)]">
              ${htmlContent}
            </div>
          </div>
          <span class="text-[10px] mt-2 ml-12 text-outline font-semibold uppercase tracking-tighter">Trợ lý Tinh Hoa Việt • Vừa xong</span>
        `;
        chatMessagesBox.appendChild(bubble);
        scrollToBottom();
      }

      function addUserBubble(text) {
        const bubble = document.createElement('div');
        bubble.className = "flex flex-col items-end animate-in slide-in-from-right-4 duration-500 mt-6";
        bubble.innerHTML = `
          <div class="max-w-[80%] bg-surface-container-highest text-on-surface p-4 rounded-xl rounded-tr-none shadow-sm">
            <p class="text-sm leading-relaxed font-semibold">${text}</p>
          </div>
          <span class="text-[10px] mt-2 text-outline font-semibold uppercase tracking-tighter">Bạn • Vừa xong</span>
        `;
        chatMessagesBox.appendChild(bubble);
        scrollToBottom();
      }

      function scrollToBottom() {
        // give it a tiny delay to wait for DOM redraw
        setTimeout(() => {
          chatMessagesBox.scrollTop = chatMessagesBox.scrollHeight;
        }, 10);
      }

      // Add the initial message and suggestions
      addAIBubble(person.initialAIChat);

      // Handle initial question from URL if any
      const initialQuestion = urlParams.get('q');
      if (initialQuestion) {
        setTimeout(() => {
          chatInput.value = initialQuestion;
          handleChatSubmit();
        }, 800); // slight delay for visual smoothness
      }

      // 5. Render Suggestions
      const suggestionsBox = document.getElementById('chat-suggestions');
      person.suggestedQuestions.forEach(q => {
        const btn = document.createElement('button');
        btn.className = "px-4 py-2 bg-surface-container-high hover:bg-surface-container-highest text-secondary text-xs font-semibold rounded-full border border-outline-variant/20 transition-all flex items-center gap-2 suggestion-btn";
        btn.dataset.question = q.text;
        btn.innerHTML = `<span class="material-symbols-outlined text-sm">${q.icon}</span> ${q.text}`;
        btn.onclick = () => {
          handleChatSubmit(q.text);
        };
        suggestionsBox.appendChild(btn);
      });

      // Chat Input Logic
      const chatInput = document.getElementById('chat-input');
      const chatSendBtn = document.getElementById('chat-send-btn');



      function addTypewriterBubble(text) {
        const bubble = document.createElement('div');
        bubble.className = "flex flex-col items-start animate-in slide-in-from-left-4 duration-700 mt-6";

        const contentId = "msg-" + Date.now();
        bubble.innerHTML = `
          <div class="flex gap-4 items-start max-w-[85%]">
            <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1">
              <img alt="Avatar" class="w-full h-full rounded-full object-cover border border-primary/20 shadow-sm ${person.imagePosition || ''}" src="${person.chatAvatar}" />
            </div>
            <div class="bg-surface-container-lowest border border-outline-variant/10 p-6 rounded-xl rounded-tl-none shadow-[0px_12px_32px_rgba(28,28,23,0.06)]">
              <p id="${contentId}" class="chat-text-content font-body"></p>
            </div>
          </div>
          <span class="text-[10px] mt-2 ml-12 text-outline font-semibold uppercase tracking-tighter">Trợ lý Tinh Hoa Việt • Vừa xong</span>
        `;
        chatMessagesBox.appendChild(bubble);
        scrollToBottom();

        const contentEl = document.getElementById(contentId);
        let i = 0;
        let isTag = false;

        // Basic markdown to HTML
        let htmlText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        htmlText = htmlText.replace(/\*/g, '');
        htmlText = htmlText.replace(/\n/g, '<br>');

        let currentHTML = "";
        function typeWriter() {
          if (i < htmlText.length) {
            if (htmlText.charAt(i) === '<') isTag = true;
            currentHTML += htmlText.charAt(i);
            if (htmlText.charAt(i) === '>') isTag = false;

            contentEl.innerHTML = currentHTML;
            i++;

            if (isTag) {
              typeWriter();
            } else {
              scrollToBottom();
              setTimeout(typeWriter, 15); // tốc độ chạy chữ
            }
          } else {
            chatInput.disabled = false;
            chatSendBtn.disabled = false;
            chatInput.focus();
            scrollToBottom();
          }
        }
        typeWriter();
      }

      async function handleChatSubmit(submittedText = null) {
        const text = submittedText || chatInput.value.trim();
        if (!text) return;

        chatInput.value = '';
        chatInput.disabled = true;
        chatSendBtn.disabled = true;

        addUserBubble(text);

        // Simulated typing indicator (3 dots)
        const typingId = "typing-" + Date.now();
        const typingHTML = `
          <div id="${typingId}" class="flex flex-col items-start mt-6">
            <div class="flex gap-4 items-start max-w-[85%]">
              <div class="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center mt-1">
                <img alt="Avatar" class="w-full h-full rounded-full object-cover border border-primary/20 shadow-sm" src="${person.chatAvatar}" />
              </div>
              <div class="bg-surface-container-lowest border border-outline-variant/10 p-4 rounded-xl rounded-tl-none shadow-sm">
                <div class="typing-indicator"><span></span><span></span><span></span></div>
              </div>
            </div>
          </div>
        `;
        chatMessagesBox.insertAdjacentHTML('beforeend', typingHTML);
        scrollToBottom();

        // 1. Check if predefined question
        const matchedQuestion = person.suggestedQuestions.find(q => q.text === text);
        if (matchedQuestion && matchedQuestion.answer) {
          // Remove the suggestion button that was just asked
          document.querySelectorAll('.suggestion-btn').forEach(btn => {
            if (btn.dataset.question === text) {
              btn.remove();
            }
          });

          setTimeout(() => {
            document.getElementById(typingId).remove();
            addTypewriterBubble(matchedQuestion.answer);
          }, 600);
          return;
        }

        // 2. Chuyển hướng sang Gem riêng
        setTimeout(() => {
          document.getElementById(typingId).remove();
          let leadingText = `Câu hỏi của bạn rất đỗi thú vị! Nếu bạn muốn đàm đạo mở rộng và chuyên sâu hơn nữa, mời bạn 👉 <a href="${person.gemLink}" target="_blank" class="text-[#ac322e] font-bold underline hover:opacity-80">ghé thăm không gian trò chuyện chuyên biệt (Gem) của ta tại đây nhé!</a>`;
          addTypewriterBubble(leadingText);
        }, 1200);
      }

      // Autocomplete Logic
      const autocompletePopup = document.getElementById('autocomplete-popup');
      chatInput.addEventListener('input', (e) => {
        const searchTerm = e.target.value.toLowerCase().trim();
        autocompletePopup.innerHTML = '';
        if (!searchTerm) {
          autocompletePopup.classList.add('hidden');
          autocompletePopup.classList.remove('flex');
          return;
        }

        let hasMatches = false;
        const remainingBtns = Array.from(document.querySelectorAll('.suggestion-btn')).map(btn => btn.dataset.question);

        person.suggestedQuestions.forEach(q => {
          if (q.text.toLowerCase().includes(searchTerm)) {
            // Check if it's still available as a suggestion button (not asked yet)
            if (remainingBtns.includes(q.text)) {
              hasMatches = true;
              const div = document.createElement('div');
              div.className = "flex items-center gap-3 p-3 hover:bg-surface-container-high rounded-lg cursor-pointer transition-colors text-sm font-semibold text-stone-700";
              div.innerHTML = `<span class="material-symbols-outlined text-primary/70 text-sm">${q.icon}</span> ${q.text}`;
              div.onclick = () => {
                autocompletePopup.classList.add('hidden');
                autocompletePopup.classList.remove('flex');
                handleChatSubmit(q.text);
              };
              autocompletePopup.appendChild(div);
            }
          }
        });

        if (hasMatches) {
          autocompletePopup.classList.remove('hidden');
          autocompletePopup.classList.add('flex');
        } else {
          autocompletePopup.classList.add('hidden');
          autocompletePopup.classList.remove('flex');
        }
      });

      document.addEventListener('click', (e) => {
         if (!autocompletePopup.contains(e.target) && e.target !== chatInput) {
            autocompletePopup.classList.add('hidden');
            autocompletePopup.classList.remove('flex');
         }
      });

      chatInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleChatSubmit();
      });
      chatSendBtn.onclick = () => handleChatSubmit();

      // Trigger fade-in animation
      setTimeout(() => {
        mainContent.classList.add('loaded');
      }, 50);
    });
  </script>
</body>

</html>
